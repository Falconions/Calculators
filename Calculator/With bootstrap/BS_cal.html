<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white">

    <div class="container py-5 d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="calculator-card shadow-lg">
            <input type="text" id="display" class="form-control" readonly value="0">

            <div class="row g-3">
                <div class="col-3"><button class="btn btn-orange w-100" onclick="clearDisplay()">AC</button></div>
                <div class="col-3"><button class="btn btn-orange w-100" onclick="deleteLast()">DEL</button></div>
                <div class="col-3"><button class="btn btn-orange w-100" onclick="appendToDisplay('/')">/</button></div>
                <div class="col-3"><button class="btn btn-orange w-100" onclick="appendToDisplay('*')">*</button></div>
                
                <div class="col-3"><button class="btn btn-gray w-100" onclick="appendToDisplay('7')">7</button></div>
                <div class="col-3"><button class="btn btn-gray w-100" onclick="appendToDisplay('8')">8</button></div>
                <div class="col-3"><button class="btn btn-gray w-100" onclick="appendToDisplay('9')">9</button></div>
                <div class="col-3"><button class="btn btn-orange w-100" onclick="appendToDisplay('-')">-</button></div>
                <div class="col-3"><button class="btn btn-gray w-100" onclick="appendToDisplay('4')">4</button></div>
                <div class="col-3"><button class="btn btn-gray w-100" onclick="appendToDisplay('5')">5</button></div>
                <div class="col-3"><button class="btn btn-gray w-100" onclick="appendToDisplay('6')">6</button></div>
                <div class="col-3"><button class="btn btn-orange w-100" onclick="appendToDisplay('+')">+</button></div>

                <div class="col-9">
                    <div class="row g-3">
                        <div class="col-4"><button class="btn btn-gray w-100" onclick="appendToDisplay('1')">1</button></div>
                        <div class="col-4"><button class="btn btn-gray w-100" onclick="appendToDisplay('2')">2</button></div>
                        <div class="col-4"><button class="btn btn-gray w-100" onclick="appendToDisplay('3')">3</button></div>
                        <div class="col-8"><button class="btn btn-gray w-100" onclick="appendToDisplay('0')">0</button></div>
                        <div class="col-4"><button class="btn btn-gray w-100" onclick="appendToDisplay('.')">.</button></div>
                    </div>
                </div>
                <div class="col-3">
                    <button class="btn btn-orange btn-tall w-100" onclick="calculate()">=</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
